services:
  # ============================================================
  # Infrastructure
  # ============================================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: socialapp-sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_Strong_Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Your_Strong_Passw0rd" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - socialapp-network

  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: socialapp-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./scripts/init-databases.sql:/init-databases.sql
    entrypoint: ["/opt/mssql-tools18/bin/sqlcmd", "-S", "sqlserver", "-U", "sa", "-P", "Your_Strong_Passw0rd", "-C", "-i", "/init-databases.sql"]
    networks:
      - socialapp-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: socialapp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - socialapp-network

  # ============================================================
  # Application Services
  # ============================================================
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: socialapp-api-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override YARP cluster destinations to use Docker service names
      ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address: http://auth-service:8080
      ReverseProxy__Clusters__user-cluster__Destinations__user-service__Address: http://user-service:8080
      ReverseProxy__Clusters__chat-cluster__Destinations__chat-service__Address: http://chat-service:8080
      ReverseProxy__Clusters__post-cluster__Destinations__post-service__Address: http://post-service:8080
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      chat-service:
        condition: service_started
      post-service:
        condition: service_started
    networks:
      - socialapp-network

  auth-service:
    build:
      context: .
      dockerfile: Services/AuthService/Dockerfile
    container_name: socialapp-auth-service
    restart: unless-stopped
    ports:
      - "5201:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=social_app_auth_db;User Id=sa;Password=Your_Strong_Passw0rd;TrustServerCertificate=True"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  user-service:
    build:
      context: .
      dockerfile: Services/UserService/Dockerfile
    container_name: socialapp-user-service
    restart: unless-stopped
    ports:
      - "5202:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=social_app_user_db;User Id=sa;Password=Your_Strong_Passw0rd;TrustServerCertificate=True"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  chat-service:
    build:
      context: .
      dockerfile: Services/ChatService/Dockerfile
    container_name: socialapp-chat-service
    restart: unless-stopped
    ports:
      - "5203:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=social_app_chat_db;User Id=sa;Password=Your_Strong_Passw0rd;TrustServerCertificate=True"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  post-service:
    build:
      context: .
      dockerfile: Services/PostService/Dockerfile
    container_name: socialapp-post-service
    restart: unless-stopped
    ports:
      - "5204:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=social_app_post_db;User Id=sa;Password=Your_Strong_Passw0rd;TrustServerCertificate=True"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

# ============================================================
# Volumes & Networks
# ============================================================
volumes:
  sqlserver_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  socialapp-network:
    driver: bridge

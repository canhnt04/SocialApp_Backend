version: '3.8'

services:
  # ============================================================
  # Infrastructure
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: socialapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_MULTIPLE_DATABASES: social_app_auth_db,social_app_user_db,social_app_chat_db,social_app_post_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - socialapp-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: socialapp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - socialapp-network

  # ============================================================
  # Application Services
  # ============================================================
  api-gateway:
    build:
      context: .
      dockerfile: ApiGateway/Dockerfile
    container_name: socialapp-api-gateway
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Override YARP cluster destinations to use Docker service names
      ReverseProxy__Clusters__auth-cluster__Destinations__auth-service__Address: http://auth-service:8080
      ReverseProxy__Clusters__user-cluster__Destinations__user-service__Address: http://user-service:8080
      ReverseProxy__Clusters__chat-cluster__Destinations__chat-service__Address: http://chat-service:8080
      ReverseProxy__Clusters__post-cluster__Destinations__post-service__Address: http://post-service:8080
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      chat-service:
        condition: service_started
      post-service:
        condition: service_started
    networks:
      - socialapp-network

  auth-service:
    build:
      context: .
      dockerfile: Services/AuthService/Dockerfile
    container_name: socialapp-auth-service
    restart: unless-stopped
    ports:
      - "5201:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=social_app_auth_db;Username=postgres;Password=123456"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  user-service:
    build:
      context: .
      dockerfile: Services/UserService/Dockerfile
    container_name: socialapp-user-service
    restart: unless-stopped
    ports:
      - "5202:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=social_app_user_db;Username=postgres;Password=123456"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  chat-service:
    build:
      context: .
      dockerfile: Services/ChatService/Dockerfile
    container_name: socialapp-chat-service
    restart: unless-stopped
    ports:
      - "5203:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=social_app_chat_db;Username=postgres;Password=123456"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

  post-service:
    build:
      context: .
      dockerfile: Services/PostService/Dockerfile
    container_name: socialapp-post-service
    restart: unless-stopped
    ports:
      - "5204:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=social_app_post_db;Username=postgres;Password=123456"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__UserName: guest
      RabbitMQ__Password: guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - socialapp-network

# ============================================================
# Volumes & Networks
# ============================================================
volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local

networks:
  socialapp-network:
    driver: bridge
